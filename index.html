<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Bingo</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="page">
    <h1>D&D Party Bingo</h1>
    <p class="subtitle">Mark a square whenever it happens during the session.</p>

    <div class="controls">
      <button id="shuffle-btn">New Board</button>
      <button id="reset-btn">Reset Marks</button>
    </div>

    <div id="bingo-message"></div>
    <div id="bingo-board"></div>
  </div>
</body>
</html>
